<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Digital SAVAL 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-mid:#AFA9EC;
  --amber:#EF9F27;--amber-light:#FAEEDA;
  --green:#639922;--green-light:#EAF3DE;
  --red:#E24B4A;--red-light:#FCEBEB;
  --gray-light:#F1EFE8;
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe8;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:#e0dfd8;--border2:#c8c7bf;
  --radius:8px;--radius-lg:12px
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;--text:#f0f0f0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:var(--bg3);color:var(--text);min-height:100vh}

/* ── NAV ── */
.main-nav{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100}
.nav-brand{font-size:14px;font-weight:600;color:var(--purple);margin-right:24px;padding:14px 0;white-space:nowrap}
.nav-tabs{display:flex;gap:2px}
.nav-tab{font-size:13px;padding:14px 16px;border:none;background:none;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:500}
.nav-date{margin-left:auto;font-size:11px;color:var(--text3);padding:14px 0}

/* ── SECTIONS ── */
.section{display:none;max-width:960px;margin:0 auto;padding:24px 16px}
.section.active{display:block}

/* ── SHARED ── */
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.sum-card{background:var(--bg2);border-radius:var(--radius);padding:10px 14px}
.sum-n{font-size:22px;font-weight:600;color:var(--text)}
.sum-l{font-size:11px;color:var(--text2);margin-top:2px}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
select{font-size:12px;padding:5px 10px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg);color:var(--text)}

/* ── OBJECTIVES ── */
.person-tabs{display:flex;gap:4px;background:var(--bg2);border-radius:var(--radius);padding:3px}
.ptab{font-size:12px;padding:5px 14px;border-radius:6px;border:none;background:none;color:var(--text2);cursor:pointer}
.ptab.active{background:var(--bg);color:var(--text);border:0.5px solid var(--border)}
.obj-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden}
.obj-header{display:flex;align-items:flex-start;gap:10px;padding:13px 16px;cursor:pointer;user-select:none}
.obj-header:hover{background:var(--bg2)}
.semaforo{width:13px;height:13px;border-radius:50%;flex-shrink:0;margin-top:3px}
.s-verde{background:#639922}.s-sobre{background:#534AB7}.s-amarillo{background:#EF9F27}.s-rojo{background:#E24B4A}.s-gris{background:#B4B2A9}
.obj-num{font-size:11px;font-weight:600;color:var(--text3);flex-shrink:0;min-width:18px;margin-top:2px}
.obj-title{font-size:13px;font-weight:500;color:var(--text);flex:1;line-height:1.45}
.chev{color:var(--text3);font-size:11px;flex-shrink:0;transition:transform .15s;margin-top:2px}
.chev.open{transform:rotate(90deg)}
.obj-body{border-top:0.5px solid var(--border);padding:14px 16px}
.sub-obj{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.sub-obj:last-child{margin-bottom:0}
.sub-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.sub-semaforo{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.sub-title{font-size:12px;color:var(--text);flex:1;line-height:1.4}
.sub-peso{font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:6px;margin-bottom:8px}
.metric-box{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;padding:7px 10px}
.metric-lbl{font-size:10px;color:var(--text2);margin-bottom:2px}
.metric-meta{font-size:10px;color:var(--text3);margin-bottom:4px}
.metric-input{font-size:12px;padding:4px 7px;border-radius:5px;border:0.5px solid var(--border);background:var(--bg);color:var(--text);width:100%}
.metric-input:focus{outline:none;border-color:var(--purple-mid)}
.progress-wrap{margin-top:8px}
.progress-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-bottom:3px}
.progress-bg{height:5px;background:var(--bg3);border-radius:20px;overflow:hidden}
.progress-fill{height:100%;border-radius:20px;transition:width .4s}
.fill-sobre{background:#534AB7}.fill-verde{background:#639922}.fill-amarillo{background:#EF9F27}.fill-rojo{background:#E24B4A}.fill-gris{background:#B4B2A9}
.alert-box{margin-top:8px;padding:7px 10px;border-radius:6px;font-size:11px;line-height:1.5}
.alert-rojo{background:var(--red-light);color:#791F1F;border:0.5px solid #F09595}
.alert-amarillo{background:var(--amber-light);color:#633806;border:0.5px solid #FAC775}
.alert-verde{background:var(--green-light);color:#27500A;border:0.5px solid #C0DD97}
.alert-sobre{background:var(--purple-light);color:#3C3489;border:0.5px solid var(--purple-mid)}
.nota-row{margin-top:8px}
.nota-input{width:100%;font-size:11px;padding:5px 8px;border-radius:6px;border:0.5px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit}
.nota-input:focus{outline:none;border-color:var(--purple-mid)}
.nota-input::placeholder{color:var(--text3)}
.empty-person{text-align:center;padding:3rem;color:var(--text2);font-size:13px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg)}

/* ── CUADRO FIJO CUMPLIMIENTO PERSONAL ── */
.perfil-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px}
.perfil-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.perfil-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0}
.perfil-name{font-size:14px;font-weight:500;color:var(--text)}
.perfil-mes{font-size:11px;color:var(--text3);margin-top:1px}
.perfil-global{margin-left:auto;text-align:right}
.perfil-global-n{font-size:24px;font-weight:600;line-height:1}
.perfil-global-l{font-size:10px;color:var(--text3);margin-top:2px}
.perfil-grid{display:flex;flex-direction:column;gap:5px}
.pobj-row{background:var(--bg2);border-radius:var(--radius);padding:8px 12px;display:flex;align-items:center;gap:10px}
.pobj-top{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.pobj-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pobj-num{font-size:11px;color:var(--text3);flex-shrink:0;min-width:16px}
.pobj-title{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pobj-pct{font-size:13px;font-weight:600;flex-shrink:0;min-width:38px;text-align:right}
.pobj-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pobj-bar-bg{width:100px;height:5px;background:var(--bg3);border-radius:20px;overflow:hidden;position:relative;flex-shrink:0}
.pobj-bar-fill{height:100%;border-radius:20px;transition:width .4s}
.pobj-marker{position:absolute;top:-3px;width:2px;height:11px;background:rgba(83,74,183,.45);border-radius:1px}
.pobj-brecha{font-size:10px;color:var(--text3);white-space:nowrap;min-width:160px;text-align:right}
.pobj-tag{font-size:10px;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;min-width:90px;text-align:center}

/* ── RECOMENDACIONES EQUIPO ── */
.rec-equipo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.rec-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.rec-card-header{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.rec-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.rec-name{font-size:12px;font-weight:500;color:var(--text)}
.rec-textarea{width:100%;font-size:11px;padding:6px 8px;border-radius:6px;border:0.5px solid var(--border);background:var(--bg);color:var(--text);resize:vertical;font-family:inherit;line-height:1.5;min-height:72px}
.rec-textarea:focus{outline:none;border-color:var(--purple-mid)}
.rec-textarea::placeholder{color:var(--text3)}

/* ── GRID UNE DETALLE ── */
.une-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-top:8px}
.une-cell{background:var(--bg2);border:0.5px solid var(--border);border-radius:5px;padding:5px 4px;text-align:center}
.une-cell.total-cell{background:var(--purple-light);border-color:var(--purple-mid)}
.une-lbl{font-size:9px;color:var(--text3);font-weight:500;text-transform:uppercase;margin-bottom:3px}
.une-input{width:100%;font-size:12px;font-weight:500;text-align:center;border:none;background:transparent;color:var(--text);padding:0;outline:none}
.une-input:focus{color:var(--purple)}
.une-total{font-size:13px;font-weight:600;color:var(--purple)}

/* ── ENTREGABLE MENSUAL ── */
.entregable-block{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:4px}
.entregable-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.entregable-lbl{font-size:11px;color:var(--text2);flex:1}
.entregable-meta{font-size:10px;color:var(--text3)}
.entregable-body{display:flex;flex-direction:column;gap:6px}
.entregable-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.entregable-input{flex:1;min-width:120px;font-size:11px;padding:4px 8px;border-radius:5px;border:0.5px solid var(--border);background:var(--bg);color:var(--text)}
.entregable-input:focus{outline:none;border-color:var(--purple-mid)}
.entregable-link{flex:2;min-width:160px;font-size:11px;padding:4px 8px;border-radius:5px;border:0.5px solid var(--border);background:var(--bg);color:var(--text)}
.entregable-link:focus{outline:none;border-color:var(--purple-mid)}
.btn-completado{font-size:11px;padding:4px 12px;border-radius:5px;border:0.5px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-completado:hover{background:var(--green-light);border-color:#C0DD97;color:#27500A}
.btn-completado.done{background:var(--green-light);border-color:#C0DD97;color:#27500A;font-weight:500}
.entregable-fecha{font-size:11px;padding:4px 7px;border-radius:5px;border:0.5px solid var(--border);background:var(--bg);color:var(--text)}
.entregable-link-view{font-size:10px;color:var(--purple);text-decoration:none;white-space:nowrap}
.entregable-link-view:hover{text-decoration:underline}

/* ── CUMPLIMIENTO ANUAL ── */
.anual-panel{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px}
.anual-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.anual-title{font-size:13px;font-weight:500;color:var(--text)}
.anual-meta{font-size:11px;color:var(--text3)}
.tiempo-bar-wrap{margin-bottom:12px}
.tiempo-bar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:3px}
.tiempo-bar-bg{height:4px;background:var(--bg3);border-radius:20px;overflow:hidden}
.tiempo-bar-fill{height:100%;background:var(--purple-mid);border-radius:20px}
.obj-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border)}
.obj-row:last-child{border-bottom:none}
.obj-row-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.obj-row-name{font-size:11px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px}
.obj-row-bar-bg{flex:1;height:6px;background:var(--bg3);border-radius:20px;overflow:hidden;min-width:50px;position:relative}
.obj-row-bar{height:100%;border-radius:20px;transition:width .4s}
.obj-row-marker{position:absolute;top:-2px;width:2px;height:10px;background:rgba(83,74,183,.5);border-radius:1px}
.obj-row-pct{font-size:11px;font-weight:500;min-width:34px;text-align:right}
.obj-row-tag{font-size:10px;padding:1px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.oa-verde{background:var(--green-light);color:#27500A}
.oa-amarillo{background:var(--amber-light);color:#633806}
.oa-rojo{background:var(--red-light);color:#791F1F}
.oa-gris{background:var(--gray-light);color:#555}
.obj-anual-strip{padding:7px 16px 10px;background:var(--bg2);border-top:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.obj-anual-lbl{font-size:10px;color:var(--text3);white-space:nowrap}
.obj-anual-bar-bg{flex:1;height:5px;background:var(--bg3);border-radius:20px;overflow:hidden;position:relative}
.obj-anual-bar-fill{height:100%;border-radius:20px;transition:width .4s}
.obj-anual-marker{position:absolute;top:-2px;width:2px;height:9px;background:rgba(83,74,183,.6);border-radius:1px}
.obj-anual-pct{font-size:11px;font-weight:500;min-width:34px;text-align:right}
.obj-anual-tag{font-size:10px;padding:1px 7px;border-radius:20px;white-space:nowrap}

/* ── GESTOR TAREAS ── */
.project-block{margin-bottom:8px;border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg);transition:box-shadow .15s,opacity .15s}
.project-block.dragging{opacity:.45;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.project-block.drag-over{border-color:var(--purple);box-shadow:0 0 0 2px var(--purple-light)}
.project-header{display:flex;align-items:center;gap:8px;padding:11px 14px;background:var(--bg2);cursor:pointer;user-select:none}
.project-header:hover{background:var(--bg3)}
.drag-handle{cursor:grab;color:var(--text3);font-size:14px;padding:0 2px;flex-shrink:0}
.project-name{font-size:13px;font-weight:500;color:var(--text);flex:1}
.project-type{font-size:10px;padding:2px 8px;border-radius:20px;white-space:nowrap}
.type-reporte{background:#EEEDFE;color:#3C3489}
.type-diseno{background:#E1F5EE;color:#085041}
.type-seguimiento{background:#FAEEDA;color:#633806}
.type-plataforma{background:#FAECE7;color:#712B13}
.progress-bar-wrap{width:70px;height:4px;background:var(--bg);border-radius:20px;overflow:hidden;border:0.5px solid var(--border)}
.progress-bar-fill{height:100%;border-radius:20px;background:var(--purple);transition:width .3s}
.project-pct{font-size:11px;color:var(--text3);min-width:28px;text-align:right}
.project-dates{font-size:10px;color:var(--text3);white-space:nowrap}
.resp-tag{font-size:10px;color:var(--text3);padding:2px 8px;border-radius:20px;background:var(--bg);border:0.5px solid var(--border);white-space:nowrap}
.btn-x{width:20px;height:20px;border-radius:4px;border:1px solid var(--red);background:var(--red-light);color:var(--red);font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;padding:0}
.btn-x:hover{background:var(--red);color:#fff}
.subtasks{border-top:0.5px solid var(--border)}
.subtask-row{border-bottom:0.5px solid var(--border)}
.subtask-row:last-child{border-bottom:none}
.subtask-row.sub-dragging{opacity:.4}
.subtask-row.sub-drag-over{border-top:2px solid var(--purple)}
.sub-main{display:flex;align-items:center;gap:7px;padding:8px 12px 8px 10px}
.sub-main:hover{background:var(--bg2)}
.sub-drag-handle{cursor:grab;color:var(--text3);font-size:13px;padding:0 3px;flex-shrink:0}
.cb{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all .15s}
.cb.checked{background:var(--purple);border-color:var(--purple);color:#fff}
.subtask-text{font-size:12px;color:var(--text);flex:1;line-height:1.4}
.subtask-text.done{text-decoration:line-through;color:var(--text3)}
.subtask-date-input{font-size:11px;color:var(--text2);border:0.5px solid var(--border);border-radius:5px;padding:2px 6px;background:var(--bg2);cursor:pointer;width:112px}
.subtask-date-input:hover{border-color:var(--border2)}
.subtask-date-input:focus{outline:none;border-color:var(--purple-mid);background:var(--bg)}
.resp-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg2);color:var(--text2);border:0.5px solid var(--border);white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis}
.sub-status-select{font-size:10px;padding:2px 6px;border-radius:20px;white-space:nowrap;cursor:pointer;border:none;font-family:inherit;font-weight:500;appearance:none;-webkit-appearance:none}
.sub-status-select.st-pendiente{background:var(--gray-light);color:#444}
.sub-status-select.st-proceso{background:var(--amber-light);color:#633806}
.sub-status-select.st-listo{background:var(--green-light);color:#27500A}
.sub-status-select.st-bloqueado{background:var(--red-light);color:#791F1F}
.sub-actions{display:flex;gap:5px;flex-shrink:0;align-items:center}
.btn-cmt{font-size:10px;padding:2px 8px;border-radius:5px;border:0.5px solid var(--border);background:transparent;color:var(--purple);cursor:pointer;white-space:nowrap}
.btn-cmt:hover,.btn-cmt.active{background:var(--purple-light);border-color:var(--purple-mid)}
.comment-panel{padding:10px 12px 12px 36px;background:#fffdf5;border-top:0.5px solid var(--border)}
.comment-label{font-size:10px;color:var(--text3);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.comment-box{width:100%;font-size:12px;padding:7px 9px;border-radius:6px;border:0.5px solid var(--border);background:var(--bg);color:var(--text);resize:vertical;font-family:inherit;line-height:1.5;min-height:56px}
.comment-box:focus{outline:none;border-color:var(--purple-mid)}
.comment-meta{display:flex;gap:10px;margin-top:8px;align-items:center;flex-wrap:wrap}
.comment-meta label{font-size:11px;color:var(--text3)}
.comment-meta input{font-size:11px;padding:4px 8px;border-radius:6px;border:0.5px solid var(--border);background:var(--bg);color:var(--text)}
.add-sub-row{display:flex;gap:6px;padding:8px 12px;border-top:0.5px solid var(--border);background:var(--bg2);flex-wrap:wrap}
.add-sub-row input[type=text]{flex:1;min-width:100px;font-size:12px;padding:5px 8px;border-radius:6px;border:0.5px solid var(--border);background:var(--bg);color:var(--text)}
.add-sub-row input[type=date],.add-sub-row select{font-size:11px;padding:5px 6px;border-radius:6px;border:0.5px solid var(--border);background:var(--bg);color:var(--text)}
.add-sub-row button{font-size:11px;padding:5px 12px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer}
.add-form{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px;display:none}
.add-form.visible{display:block}
.add-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.add-form-grid input,.add-form-grid select{font-size:12px;padding:7px 10px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg);color:var(--text)}
.add-form-actions{display:flex;gap:8px;justify-content:flex-end}
.btn{font-size:12px;padding:6px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg2)}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}

<script>
const SB_AUTH_URL='https://pfajjfglzsvribhremwf.supabase.co/auth/v1';
const SB_ANON_KEY='sb_publishable_btGXQfzBY0y16dDO4E3nmg_uJlZOfOP';
let isAdmin=false;
let adminToken=null;

function openLoginModal(){ document.getElementById('login-modal').style.display='flex'; }
function closeLoginModal(){ document.getElementById('login-modal').style.display='none'; document.getElementById('login-error').style.display='none'; }

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  try{
    const res=await fetch(SB_AUTH_URL+'/token?grant_type=password', {
      method:'POST',
      headers:{'apikey':SB_ANON_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass})
    });
    const data=await res.json();
    if(res.ok && data.access_token){
      adminToken=data.access_token;
      isAdmin=true;
      sessionStorage.setItem('saval_admin_token', adminToken);
      sessionStorage.setItem('saval_admin_email', email);
      closeLoginModal();
      updateAdminUI();
    } else {
      document.getElementById('login-error').style.display='block';
    }
  }catch(e){
    document.getElementById('login-error').style.display='block';
  }
}

function doLogout(){
  isAdmin=false;
  adminToken=null;
  sessionStorage.removeItem('saval_admin_token');
  sessionStorage.removeItem('saval_admin_email');
  updateAdminUI();
}

// Restaurar sesión si ya había login en esta pestaña
const savedToken=sessionStorage.getItem('saval_admin_token');
if(savedToken){
  adminToken=savedToken;
  isAdmin=true;
}

function updateAdminUI(){
  const badge=document.getElementById('admin-badge');
  if(!badge) return;
  if(isAdmin){
    const email=sessionStorage.getItem('saval_admin_email')||'';
    badge.innerHTML=`<span style="font-size:11px;color:#27500A;background:#EAF3DE;padding:3px 10px;border-radius:20px;border:0.5px solid #C0DD97">✓ Editando como ${email.split('@')[0]}</span> <button onclick="doLogout()" class="nav-ctrl" style="font-size:11px;padding:3px 9px;border-radius:20px;border:0.5px solid #ddd;background:transparent;color:#888;cursor:pointer;margin-left:4px">Salir</button>`;
  } else {
    badge.innerHTML=`<button onclick="openLoginModal()" class="nav-ctrl" style="font-size:11px;padding:4px 12px;border-radius:20px;border:0.5px solid #ddd;background:transparent;color:#888;cursor:pointer">🔒 Solo lectura — Iniciar sesión</button>`;
  }
  // IDs que siempre deben estar activos (navegación, no edición)
  const navIds=new Set(['login-email','login-pass','month-to','month-from','vtab-mes','vtab-acum','month-sel']);
  // Clases de navegación siempre activas
  const navClasses=['ptab','view-tab','nav-tab','nav-ctrl'];

  document.querySelectorAll('input,select,textarea').forEach(el=>{
    if(navIds.has(el.id)) return;
    el.disabled=!isAdmin;
  });
  document.querySelectorAll('button').forEach(el=>{
    if(navIds.has(el.id)) return;
    if(navClasses.some(c=>el.classList.contains(c))) return;
    if(el.closest('#login-modal')) return;
    if(!isAdmin){ el.style.pointerEvents='none'; el.style.opacity='0.4'; }
    else { el.style.pointerEvents=''; el.style.opacity=''; }
  });
  document.querySelectorAll('.drag-handle,.sub-drag-handle').forEach(el=>{
    if(isAdmin){ el.style.pointerEvents=''; el.style.opacity=''; }
    else { el.style.pointerEvents='none'; el.style.opacity='0.3'; }
  });
}
</script>

const SUPABASE_URL='https://pfajjfglzsvribhremwf.supabase.co';

const SB_HEADERS={
  'apikey':SUPABASE_KEY,
  'Authorization':'Bearer '+SUPABASE_KEY,
  'Content-Type':'application/json'
};

// Caché local en memoria — espejo de lo que hay en Supabase
let cloudStore={};
let cloudReady=false;
let syncQueue=new Set();
let syncTimer=null;

// Carga inicial: trae TODAS las filas de la tabla panel_datos
async function cloudLoadAll(){
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/panel_datos?select=clave,valor', {headers:SB_HEADERS});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const rows=await res.json();
    cloudStore={};
    rows.forEach(r=>{ cloudStore[r.clave]=r.valor; });
    cloudReady=true;
  }catch(e){
    console.error('Error cargando datos de Supabase:',e);
    cloudReady=true; // seguir igual, arranca vacío
  }
}

// Lectura síncrona desde el caché en memoria (ya cargado al inicio)
function cloudGet(key){
  return cloudStore.hasOwnProperty(key) ? cloudStore[key] : '';
}

// Headers dinámicos: usa el token del admin si hay sesión, si no usa la key pública (solo lectura por RLS)
function sbWriteHeaders(){
  return {
    'apikey':SUPABASE_KEY,
    'Authorization': isAdmin && adminToken ? 'Bearer '+adminToken : 'Bearer '+SUPABASE_KEY,
    'Content-Type':'application/json'
  };
}

// Escritura: actualiza caché local al instante y encola sync a Supabase (solo si es admin)
function cloudSet(key,value){
  if(!isAdmin){ return; } // bloqueo en frontend; el backend también lo bloquea via RLS
  cloudStore[key]=value;
  syncQueue.add(key);
  scheduleSync();
}

function cloudDelete(key){
  if(!isAdmin){ return; }
  delete cloudStore[key];
  syncDeleteRemote(key);
}

// Agrupa escrituras en lotes cada 600ms para no saturar la red mientras se escribe
function scheduleSync(){
  if(syncTimer) clearTimeout(syncTimer);
  syncTimer=setTimeout(flushSyncQueue, 600);
}

async function flushSyncQueue(){
  const keys=Array.from(syncQueue);
  syncQueue.clear();
  if(keys.length===0) return;
  const rows=keys.map(k=>({clave:k, valor:cloudStore[k], updated_at:new Date().toISOString()}));
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/panel_datos?on_conflict=clave', {
      method:'POST',
      headers:{...sbWriteHeaders(),'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify(rows)
    });
    if(!res.ok){ console.error('Supabase rechazó la escritura (¿no autenticado?):', res.status); return; }
    showCloudSynced();
  }catch(e){
    console.error('Error sincronizando con Supabase:',e);
  }
}

async function syncDeleteRemote(key){
  try{
    await fetch(SUPABASE_URL+'/rest/v1/panel_datos?clave=eq.'+encodeURIComponent(key), {
      method:'DELETE', headers:sbWriteHeaders()
    });
  }catch(e){console.error('Error eliminando de Supabase:',e);}
}

  const t=document.getElementById('toast');

function osk(p,m,id,k){return`obj_${p}_m${m}_${id}_${k}`}
function getOV(p,m,id,k){return cloudGet(osk(p,m,id,k));}
function setOV(p,m,id,k,v){cloudSet(osk(p,m,id,k),v); showToast();}
function saveRec(p,m,id,k,v){cloudSet(osk(p,m,id,k),v);}
function toggleEntregable(p,m,subid,key){
  const done=getOV(p,m,subid,key+'_done')==='1';
  setOV(p,m,subid,key+'_done',done?'0':'1');
  setOV(p,m,subid,key,done?'0':'100');
  if(!done){
    // auto-poner fecha hoy si no tiene
    const fechaActual=getOV(p,m,subid,key+'_fecha');
    if(!fechaActual) setOV(p,m,subid,key+'_fecha',new Date().toISOString().slice(0,10));
  }
  renderObjetivos();
}
function getONota(p,m,sid){return cloudGet(`onota_${p}_m${m}_${sid}`);}
function setONota(p,m,sid,v){cloudSet(`onota_${p}_m${m}_${sid}`,v); showToast();}

/* ── Meta esperada proporcional ──
   acum: la meta se distribuye linealmente entre inicio y dic (mes 12)
   puntual: la meta es fija cada mes, se compara directamente
   mesesDisp = meses del período (ej campaña BS: 6→12 = 7 meses)
   esperadoAlMes m = meta * (m - inicio + 1) / mesesDisp
*/
/* ── Visibilidad de subtarea por fecha ──
   visInicio: mes en que empieza a mostrarse (default: siempre visible, sin filtro)
   visFin: mes en que deja de mostrarse (opcional, default 12)
   visFreq: cada cuántos meses se muestra a partir de visInicio (default 1 = todos los meses)
   Ej: visInicio:7, visFreq:2 → visible en jul(7), sep(9), nov(11)
*/
function subVisibleEnMes(sub, m){
  if(!sub.visInicio) return true; // sin filtro configurado = siempre visible
  const fin = sub.visFin || 12;
  if(m < sub.visInicio || m > fin) return false;
  const freq = sub.visFreq || 1;
  return (m - sub.visInicio) % freq === 0;
}

function metaEsperada(campo, m){
  const inicio = campo.inicio || 1;
  if(m < inicio) return null; // aún no aplica
  if(campo.tipo === 'acum'){
    const mesesDisp = 12 - inicio + 1;
    const mesesTransc = m - inicio + 1;
    return campo.meta * (mesesTransc / mesesDisp);
  }
  return campo.meta; // puntual: meta fija
}

/* Semáforo de un campo individual considerando:
   1. Si el valor supera la meta → sobrecumplimiento (verde+)
   2. Si el valor ≥ 90% de la meta esperada al mes actual → verde
   3. Si ≥ 70% → amarillo
   4. < 70% → rojo
*/
function semCampo(c, v, m){
  if(c.tipo==='entregable'){
    const done=getOV(currentPerson,m,c._subid||'',c.key+'_done')==='1';
    if(done) return 'verde';
    if(m < (c.inicio||1)) return 'gris';
    return 'gris';
  }
  if(c.tipo==='select'){
    if(isNaN(v)||v===0) return 'gris';
    if(v>=4) return 'verde';
    if(v>=3) return 'amarillo';
    if(v>=1) return 'amarillo';
    return 'gris';
  }
  if(c.tipo==='alin_pct'){
    // Campo binario 0/1, semáforo individual
    if(isNaN(v)) return 'gris';
    return v>=1 ? 'verde' : 'rojo';
  }
  const esperado = metaEsperada(c, m);
  if(esperado === null) return 'gris';
  if(isNaN(v) || v === 0) return 'gris';
  if(v >= c.meta) return 'sobre';
  const ratio = v / esperado;
  if(ratio >= 0.9) return 'verde';
  if(ratio >= 0.7) return 'amarillo';
  return 'rojo';
}

function semSub(sub,p,m){
  if(!subVisibleEnMes(sub,m)) return'gris'; // fuera de ventana de fechas/frecuencia: no aplica este mes
  let scores=[];
  sub.campos.forEach(c=>{
    if(c.tipo==='select') return;
    if(c.tipo==='alin_pct') return; // se evalúa como grupo abajo
    const v=parseFloat(getOV(p,m,sub.id,c.key));
    scores.push(semCampo(c,v,m));
  });
  // Evaluar grupo alin_pct como % de cumplimiento vs target
  const alinCampos=sub.campos.filter(c=>c.tipo==='alin_pct');
  if(alinCampos.length>0){
    const target=alinCampos[0].target||90;
    const cumplidos=alinCampos.filter(c=>{
      const v=parseFloat(getOV(p,m,sub.id,c.key));
      return !isNaN(v)&&v>=1;
    }).length;
    const pctReal=Math.round(cumplidos/alinCampos.length*100);
    if(pctReal>=target) scores.push('verde');
    else if(pctReal>=(target-15)) scores.push('amarillo');
    else scores.push('rojo');
  }
  if(!scores.length||scores.every(s=>s==='gris'))return'gris';
  if(scores.some(s=>s==='rojo'))return'rojo';
  if(scores.some(s=>s==='amarillo'))return'amarillo';
  if(scores.every(s=>s==='sobre'||s==='verde'||s==='gris'))return'verde';
  return'verde';
}
function semObj(obj,p,m){
  const ss=obj.subs.map(s=>semSub(s,p,m));
  if(ss.every(s=>s==='gris'))return'gris';
  if(ss.some(s=>s==='rojo'))return'rojo';
  if(ss.some(s=>s==='amarillo'))return'amarillo';
  if(ss.every(s=>s==='sobre'||s==='gris'))return'sobre';
  return'verde';
}

/* % de avance acumulado desde currentMonthFrom hasta m */
function avancePct(sub,p,m){
  const mFrom=currentMonthFrom||1;
  let vals=[];
  sub.campos.forEach(c=>{
    if(c.tipo==='select') return; // IP es solo informativo, no pondera
    if(c.tipo==='entregable'){
      const inicio=Math.max(c.inicio||1,mFrom);
      const mesesTransc=Math.max(0,m-inicio+1);
      if(mesesTransc===0){vals.push(0);return;}
      let completados=0;
      for(let mi=inicio;mi<=m;mi++){
        if(getOV(p,mi,sub.id,c.key+'_done')==='1') completados++;
      }
      vals.push(Math.round(completados/mesesTransc*100));
    } else if(c.tipo==='alin_pct'){
      // no suma aquí, se calcula después como grupo
    } else {
      if(c.tipo==='acum'){
        // Acumulativo: tomar el valor más reciente dentro del rango
        let bestV=0;
        for(let mi=mFrom;mi<=m;mi++){
          const v=parseFloat(getOV(p,mi,sub.id,c.key));
          if(!isNaN(v)&&v>0) bestV=Math.max(bestV,v);
        }
        const esp=metaEsperada(c,m);
        if(bestV>0&&esp&&esp>0) vals.push(Math.min(120,Math.round(bestV/esp*100)));
      } else {
        // Puntual: promediar los meses del rango que tienen dato
        let puntuales=[];
        for(let mi=mFrom;mi<=m;mi++){
          const v=parseFloat(getOV(p,mi,sub.id,c.key));
          const esp=metaEsperada(c,mi);
          if(!isNaN(v)&&v>0&&esp&&esp>0) puntuales.push(Math.min(120,Math.round(v/esp*100)));
        }
        if(puntuales.length>0) vals.push(Math.round(puntuales.reduce((a,b)=>a+b)/puntuales.length));
      }
    }
  });
  // Calcular % alineación para sub-objetivos con campos alin_pct
  const alinCampos=sub.campos.filter(c=>c.tipo==='alin_pct');
  if(alinCampos.length>0){
    const target=alinCampos[0].target||90;
    const cumplidos=alinCampos.filter(c=>{
      const v=parseFloat(getOV(p,m,sub.id,c.key));
      return !isNaN(v)&&v>=1;
    }).length;
    let pctReal=Math.round(cumplidos/alinCampos.length*100);
    // Si el sub tiene SOLO campos alin_pct, devolver pctReal directamente
    // para que la barra muestre ej: 1/4 = 25%, 3/4 = 75%, 4/4 = 100%
    // Para rango: % de meses donde se cumplió cada UNE dentro del rango
    if(mFrom<m){
      // Calcular promedio de cumplimiento en el rango
      let cumMeses=0, totalMeses=0;
      for(let mi=mFrom;mi<=m;mi++){
        const cumMes=alinCampos.filter(c=>{
          const v=parseFloat(getOV(p,mi,sub.id,c.key));
          return !isNaN(v)&&v>=1;
        }).length;
        if(cumMes>0||getOV(p,mi,sub.id,alinCampos[0].key)!==''){
          cumMeses+=Math.round(cumMes/alinCampos.length*100);
          totalMeses++;
        }
      }
      if(totalMeses>0) pctReal=Math.round(cumMeses/totalMeses);
    }
    const soloAlin=sub.campos.every(c=>c.tipo==='alin_pct'||c.tipo==='select');
    if(soloAlin) return pctReal;
    vals.push(Math.min(120,Math.round(pctReal/target*100)));
  }
  return vals.length?Math.round(vals.reduce((a,b)=>a+b)/vals.length):0;
}

/* Texto de alerta enriquecido con datos concretos */
function alertMsg(sub,p,m,mes){
  const sem=semSub(sub,p,m);
  if(sem==='gris')return{t:'',m:''};
  if(sem==='sobre'){
    // Mensaje limpio: listar qué UNEs/campos se cumplieron y cuáles no
    let cumplidos=[], pendientes=[];
    sub.campos.forEach(c=>{
      if(c.tipo==='entregable'||c.tipo==='select') return;
      const v=parseFloat(getOV(p,m,sub.id,c.key));
      const lbl=c.lbl.replace(/— .*/,'').replace(/\(.*\)/,'').trim();
      if(!isNaN(v)&&v>=c.meta) cumplidos.push(lbl);
      else pendientes.push(lbl);
    });
    // Si son campos binarios tipo alineación (meta=1), hacer mensaje de UNEs
    const esBinario=sub.campos.every(c=>c.tipo==='alin_pct');
    if(esBinario){
      const target=sub.campos[0]?.target||90;
      const pctReal=Math.round(cumplidos.length/sub.campos.length*100);
      const msg=pendientes.length===0
        ? `✓ Alineación ${pctReal}% — target de ${target}% superado en todas las UNEs.`
        : `✓ Alineación ${pctReal}% vs target ${target}%. Cumplido: ${cumplidos.join(', ')}. No cumplido: ${pendientes.join(', ')}.`;
      return{t:'sobre',m:msg};
    }
    return{t:'sobre',m:`✓ Meta alcanzada en ${mes}. ${cumplidos.length} de ${sub.campos.length} campos en meta.`};
  }
  // Calcular brecha para el mensaje
  let brechas=[];
  sub.campos.forEach(c=>{
    if(c.tipo==='select') return; // IP no genera brecha
    const v=parseFloat(getOV(p,m,sub.id,c.key));
    const esp=metaEsperada(c,m);
    if(!isNaN(v)&&esp&&esp>0){
      const diff=Math.round(esp-v);
      if(diff>0)brechas.push(`${c.lbl}: faltan ${diff.toLocaleString('es-CL')} para ir en línea`);
    }
  });
  // Mensaje específico para IP reputación
  const hasSelect=sub.campos.some(c=>c.tipo==='select');
  if(hasSelect){
    const ipCampo=sub.campos.find(c=>c.tipo==='select');
    if(ipCampo){
      const ipV=parseInt(getOV(p,m,sub.id,ipCampo.key))||0;
      const ipLbl=['','Pésima','Mala','Normal','Buena'][ipV]||'Sin datos';
      const ipTrend=ipV>=4?'Meta alcanzada.':ipV>=3?'En progreso hacia Buena.':ipV>=1?'Estado actual registrado. Continuar mejorando.':'Sin datos aún.';
      if(sem==='verde') return{t:'verde',m:`✓ Reputación IP: ${ipLbl}. ${ipTrend}`};
      return{t:'amarillo',m:`ℹ Reputación IP actual: ${ipLbl}. ${ipTrend}`};
    }
  }
  const brechaStr=brechas.length?` — ${brechas[0]}`:'';
  // Mensaje especial para sub-objetivos de alineación (campos binarios 0/1)
  const alinCamposMsg=sub.campos.filter(c=>c.tipo==='alin_pct');
  if(alinCamposMsg.length>0){
    const target=alinCamposMsg[0].target||90;
    let cumplidos=[], pendientes=[];
    alinCamposMsg.forEach(c=>{
      const v=parseFloat(getOV(p,m,sub.id,c.key));
      if(!isNaN(v)&&v>=1) cumplidos.push(c.lbl);
      else pendientes.push(c.lbl);
    });
    const pctReal=Math.round(cumplidos.length/alinCamposMsg.length*100);
    const cumplioTarget=pctReal>=target;
    const cumlidosTxt=cumplidos.length?`Cumplido: ${cumplidos.join(', ')}.`:'';
    const pendientesTxt=pendientes.length?` No cumplido: ${pendientes.join(', ')}.`:'';
    if(cumplioTarget){
      return{t:'verde',m:`✓ Alineación ${pctReal}% — sobre el target de ${target}%. ${cumlidosTxt}${pendientesTxt}`};
    } else {
      const tipo=pctReal>=(target-15)?'amarillo':'rojo';
      const pref=tipo==='amarillo'?'⚠':'✕';
      return{t:tipo,m:`${pref} Alineación ${pctReal}% — bajo el target de ${target}%.${pendientesTxt} ${cumlidosTxt}`};
    }
  }
  if(sem==='verde')return{t:'verde',m:`✓ En línea con la meta proporcional para ${mes}.`};
  if(sem==='amarillo')return{t:'amarillo',m:`⚠ Rezagado vs lo esperado en ${mes}${brechaStr}. Revisar acciones.`};
  return{t:'rojo',m:`✕ En riesgo${brechaStr}. Acción inmediata requerida.`};
}

/* ── CUMPLIMIENTO ANUAL: helpers ── */
// Mes actual del año → % tiempo transcurrido (mes 1 = 8.3%, mes 12 = 100%)
function tiempoAnual(m){return Math.round(m/12*100)}

// Calcula avance ANUAL acumulado de un sub-objetivo (suma todos los meses hasta currentMonth)
function avanceAnualPct(sub,p){
  let vals=[];
  sub.campos.forEach(c=>{
    if(c.tipo==='select') return; // IP solo informativo, no pondera anual
    if(c.tipo==='entregable'){
      const inicio=c.inicio||1;
      const mesesTotal=12-inicio+1;
      let completados=0;
      for(let m=inicio;m<=12;m++){
        if(getOV(p,m,sub.id,c.key+'_done')==='1') completados++;
      }
      vals.push(Math.round(completados/mesesTotal*100));
    } else {
      let bestV=0;
      for(let m=1;m<=currentMonth;m++){
        const v=parseFloat(getOV(p,m,sub.id,c.key));
        if(!isNaN(v)&&v>0) bestV=Math.max(bestV,v/c.meta*100);
      }
      vals.push(Math.min(100,Math.round(bestV)));
    }
  });
  return vals.length?Math.round(vals.reduce((a,b)=>a+b)/vals.length):0;
}

// Calcula avance anual promedio de un objetivo (promedio de sus sub-objetivos ponderado)
function avanceAnualObj(obj,p){
  let total=0,peso=0;
  obj.subs.forEach(s=>{
    const a=avanceAnualPct(s,p);
    total+=a*(s.peso||100);
    peso+=(s.peso||100);
  });
  return peso>0?Math.round(total/peso):0;
}

// Semáforo anual: compara avance real vs tiempo transcurrido
// Rojo: real < tiempo-15pp | Amarillo: real < tiempo-5pp | Verde: cerca o sobre
function semAnual(avance,tiempo){
  if(avance===0)return'gris';
  if(avance>=105)return'sobre'; // sobrecumplimiento anual
  if(avance>=tiempo-5)return'verde';
  if(avance>=tiempo-15)return'amarillo';
  return'rojo';
}

        }).join('');
        recEquipoHtml=`<div style="margin-top:10px">
          <div style="font-size:10px;color:var(--text3);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.04em">Recomendaciones growth por persona — ${MESES[currentMonth]}</div>
          <div class="rec-equipo-grid">${cardsHtml}</div>
        </div>`;

          {key:'une_ofta',lbl:'OFTA'},{key:'une_car',lbl:'CAR'},{key:'une_neu',lbl:'NEU'},
          {key:'une_inf',lbl:'INF'},{key:'une_resp',lbl:'RESP'},{key:'une_gas',lbl:'GAS'},
          {key:'une_gun',lbl:'GUN'},{key:'une_otc',lbl:'OTC'}
        ];
        let totalEnvios=0, unesConEnvio=0;
        let cellsHtml=unes.map(u=>{
          const v=parseInt(getOV(currentPerson,currentMonth,sub.id,u.key))||0;
          totalEnvios+=v;
          if(v>0) unesConEnvio++;

            <div class="une-lbl">${u.lbl}</div>
            <input class="une-input" type="number" min="0" value="${v||''}" placeholder="0"

          </div>`;
        }).join('');
        // Sincronizar automáticamente el campo "envios_une" (conteo de UNEs con ≥1 envío)
        // en vez de exigir que se ingrese a mano por separado.
        const campoEnviosUne=sub.campos.find(c=>c.key==='envios_une');

          </div>

      sub.campos.forEach(c=>{
        if(c.tipo==='entregable'){
          hasEntregable=true;
          const done=getOV(currentPerson,currentMonth,sub.id,c.key+'_done')==='1';
          const fecha=getOV(currentPerson,currentMonth,sub.id,c.key+'_fecha');
          const link=getOV(currentPerson,currentMonth,sub.id,c.key+'_link');
          const v=done?100:0;
          // sync numeric value so semáforo funciona
          if(done&&getOV(currentPerson,currentMonth,sub.id,c.key)!=='100')
            setOV(currentPerson,currentMonth,sub.id,c.key,'100');
          entregableHtml+=`<div class="entregable-block">
            <div class="entregable-top">
              <span class="entregable-lbl">${c.lbl}</span>
              <span class="entregable-meta">${c.meta_lbl}</span>
            </div>
            ${c.hint?`<div style="font-size:10px;color:var(--text3);margin-bottom:6px;line-height:1.4;padding:0 0 4px">${c.hint}</div>`:''}
            <div class="entregable-body">
              <div class="entregable-row">
                <button class="btn-completado${done?' done':''}" onclick="toggleEntregable('${currentPerson}',${currentMonth},'${sub.id}','${c.key}')">
                  ${done?'✓ Completado':'Marcar completado'}
                </button>
                <input type="date" class="entregable-fecha" value="${fecha}" title="Fecha de entrega real"
                  onchange="setOV('${currentPerson}',${currentMonth},'${sub.id}','${c.key}_fecha',this.value);renderObjetivos()">
              </div>
              <div class="entregable-row">
                <input type="url" class="entregable-link" placeholder="🔗 Pegar link del entregable (Drive, Looker, etc.)..."
                  value="${link}" onchange="setOV('${currentPerson}',${currentMonth},'${sub.id}','${c.key}_link',this.value)">
                ${link?`<a class="entregable-link-view" href="${link}" target="_blank">Ver →</a>`:''}
              </div>
            </div>
          </div>`;
        } else {
          const v=getOV(currentPerson,currentMonth,sub.id,c.key);
          const hintHtml=c.hint?`<div style="font-size:10px;color:var(--text3);margin-bottom:4px;line-height:1.4">${c.hint}</div>`:'';
          if(c.tipo==='select'&&c.opciones){
            const selOpts=c.opciones.map((o,i)=>`<option value="${i+1}"${v==i+1?' selected':''}>${o}</option>`).join('');
            const selVal=parseInt(v)||0;
            const selColor=selVal===0?'var(--text3)':selVal>=4?'#639922':selVal>=3?'var(--amber)':selVal>=2?'#E97B2E':'var(--red)';
            camposHtml+=`<div class="metric-box"><div class="metric-lbl">${c.lbl}</div><div class="metric-meta">${c.meta_lbl}</div>${hintHtml}<select class="metric-input" style="color:${selColor};font-weight:${selVal>0?'500':'normal'}" onchange="setOV('${currentPerson}',${currentMonth},'${sub.id}','${c.key}',this.value);renderObjetivos()"><option value="">Seleccionar...</option>${selOpts}</select></div>`;
          } else {
            const esAutoUne = sub.une_detalle && c.key==='envios_une';
            const inputAttrs = esAutoUne ? 'readonly title="Se calcula automáticamente desde el detalle de UNEs abajo"' : `oninput="setOV('${currentPerson}',${currentMonth},'${sub.id}','${c.key}',this.value)" onchange="renderObjetivos()"`;

        }
      });
      camposHtml+='</div>';
      if(hasEntregable) camposHtml=entregableHtml+(camposHtml==='<div class="metrics-grid"></div>'?'':camposHtml);
      subsHtml+=`<div class="sub-obj"><div class="sub-top"><div class="sub-semaforo s-${ss}"></div><span class="sub-title">${sub.titulo}</span><span class="sub-peso">${sub.peso}%</span></div>${camposHtml}${uneDetalleHtml}${recEquipoHtml}<div class="progress-wrap"><div class="progress-lbl"><span>Avance mes actual</span><span>${pct}%</span></div><div class="progress-bg"><div class="progress-fill ${fillCl}" style="width:${pct}%"></div></div></div>${al.m?`<div class="alert-box alert-${al.t}">${al.m}</div>`:''}<div class="nota-row"><input class="nota-input" type="text" placeholder="Nota para ${mes}..." value="${nota.replace(/"/g,'&quot;')}" onchange="setONota('${currentPerson}',${currentMonth},'${sub.id}',this.value)"></div></div>`;
    });
    html+=`<div class="obj-card">
      <div class="obj-header" onclick="toggleOObj('${obj.id}')">
        <div class="semaforo s-${sem}"></div>
        <span class="obj-num">${obj.num}.</span>
        <span class="obj-title">${obj.titulo}</span>
        <span class="chev${isOpen?' open':''}">▶</span>

          <div class="obj-anual-bar-fill" style="width:${Math.min(100,avanceAnual)}%;background:${barAnualColor}"></div>

      <div id="ob-${obj.id}" style="display:${isOpen?'block':'none'}">
        <div class="obj-body">${subsHtml}</div>
      </div>
    </div>`;
  });
  panel.innerHTML=html;
  document.getElementById('s-total').textContent=pd.objetivos.length;
  document.getElementById('s-verde').textContent=sv;
  document.getElementById('s-amarillo').textContent=sa;
  document.getElementById('s-rojo').textContent=sr;
  if(typeof updateAdminUI==='function') updateAdminUI();
}
function toggleOObj(id){
  const el=document.getElementById('ob-'+id);
  const isOpen=el.style.display!=='none';
  openObjs[id]=!isOpen;
  el.style.display=isOpen?'none':'block';
  el.previousElementSibling.querySelector('.chev').classList.toggle('open',!isOpen);
}
function setPerson(p,btn){
  currentPerson=p;openObjs={};
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderObjetivos();
}
function setVista(modo, btn){
  vistaMode=modo;
  // Actualizar estilos de botones
  ['vtab-mes','vtab-acum'].forEach(id=>{
    const b=document.getElementById(id);
    if(!b)return;
    const active=b.id==='vtab-'+modo;
    b.style.background=active?'var(--bg)':'none';
    b.style.color=active?'var(--text)':'var(--text2)';
    b.style.border=active?'0.5px solid var(--border)':'none';
  });
  currentMonthFrom=vistaMode==='acum'?1:currentMonth;
  updateVistaLbl();
  renderObjetivos();
}
function setMonthRange(){
  const mt=document.getElementById('month-to');
  currentMonth=parseInt(mt.value)||now.getMonth()+1;
  currentMonthFrom=vistaMode==='acum'?1:currentMonth;
  updateVistaLbl();
  renderObjetivos();
}
function updateVistaLbl(){
  const lbl=document.getElementById('vista-lbl');
  if(!lbl)return;
  lbl.textContent=vistaMode==='acum'
    ? `Ene → ${MESES[currentMonth]}`
    : MESES[currentMonth];
}

let gprojects=[];
function gload(){
  try{
    const d=cloudGet('saval_gestor_v3');
    if(d){const p=JSON.parse(d);gprojects=p.projects;gpid=p.pid||10;gsid=p.sid||100;}
    else{gprojects=JSON.parse(JSON.stringify(DEFAULT_PROJECTS));}
  }catch(e){gprojects=JSON.parse(JSON.stringify(DEFAULT_PROJECTS));}
}
function gsave(){
  cloudSet('saval_gestor_v3', JSON.stringify({projects:gprojects,pid:gpid,sid:gsid}));
  showToast();
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function getPct(p){if(!p.subs.length)return 0;return Math.round(p.subs.filter(s=>s.done).length/p.subs.length*100)}
function isoToday(){return now.toISOString().slice(0,10)}
function toISO(d){return d.toISOString().slice(0,10)}

function renderGestor(){
  const el=document.getElementById('projects-list');
  el.innerHTML='';
  let total=0,pend=0,proc=0,done=0;
  gprojects.forEach(p=>{
    p.subs.forEach(s=>{total++;if(s.done)done++;else if(s.status==='proceso')proc++;else pend++;});
    const pct=getPct(p);
    const block=document.createElement('div');
    block.className='project-block';block.draggable=true;block.dataset.pid=p.id;
    block.addEventListener('dragstart',e=>{dragProjId=p.id;block.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('type','project');});
    block.addEventListener('dragend',()=>{block.classList.remove('dragging');document.querySelectorAll('.project-block').forEach(b=>b.classList.remove('drag-over'));});
    block.addEventListener('dragover',e=>{e.preventDefault();if(dragProjId!==null){e.dataTransfer.dropEffect='move';document.querySelectorAll('.project-block').forEach(b=>b.classList.remove('drag-over'));block.classList.add('drag-over');}});
    block.addEventListener('dragleave',e=>{if(!block.contains(e.relatedTarget))block.classList.remove('drag-over');});
    block.addEventListener('drop',e=>{e.preventDefault();block.classList.remove('drag-over');if(dragProjId!==null&&dragProjId!==p.id){const fi=gprojects.findIndex(x=>x.id===dragProjId);const ti=gprojects.findIndex(x=>x.id===p.id);const[m]=gprojects.splice(fi,1);gprojects.splice(ti,0,m);dragProjId=null;gsave();renderGestor();}});
    const subsHtml=p.subs.map(s=>{
      const cOpen=!!openComments[s.id];
      return`<div class="subtask-row" draggable="true" data-pid="${p.id}" data-sid="${s.id}" ondragstart="onSubDS(event,${p.id},${s.id})" ondragend="onSubDE(event)" ondragover="onSubDO(event,${p.id},${s.id})" ondragleave="onSubDL(event)" ondrop="onSubDrop(event,${p.id},${s.id})">
        <div class="sub-main">
          <span class="sub-drag-handle">⠿</span>
          <div class="cb${s.done?' checked':''}" onclick="gToggleDone(${p.id},${s.id})">${s.done?'✓':''}</div>
          <span class="subtask-text${s.done?' done':''}">${esc(s.text)}</span>
          <span class="resp-badge">${s.resp?esc(s.resp):'sin asignar'}</span>
          <input type="date" class="subtask-date-input" value="${s.date||''}" onchange="gSaveDate(${p.id},${s.id},this.value)">
          <select class="sub-status-select ${ST_CL[s.status]}" onchange="gChangeStatus(${p.id},${s.id},this.value)">
            ${STATUSES.map(st=>`<option value="${st}"${s.status===st?' selected':''}>${ST_LBL[st]}</option>`).join('')}
          </select>
          <div class="sub-actions">
            <button class="btn-cmt${cOpen?' active':''}" onclick="gToggleComment(${s.id})">💬 Notas</button>
            <button class="btn-x" onclick="gDeleteSub(${p.id},${s.id})" title="Eliminar">✕</button>
          </div>
        </div>
        <div class="comment-panel" id="gca-${s.id}" style="display:${cOpen?'block':'none'}">
          <div class="comment-label">📝 Notas y comentarios</div>
          <textarea class="comment-box" placeholder="Agrega notas, bloqueos o contexto..." oninput="gSaveComment(${p.id},${s.id},this.value)">${esc(s.comment||'')}</textarea>
          <div class="comment-meta"><label>Responsable:</label><input type="text" value="${esc(s.resp||'')}" placeholder="Nombre..." style="width:130px" oninput="gSaveResp(${p.id},${s.id},this.value)"><label>Fecha:</label><input type="date" value="${s.date||''}" oninput="gSaveDate(${p.id},${s.id},this.value)"></div>
        </div>
      </div>`;
    }).join('');
    block.innerHTML=`
      <div class="project-header" onclick="gHeaderClick(event,${p.id})">
        <span class="drag-handle">⠿⠿</span>
        <span class="chev-g${p.open?' open':''}">▶</span>
        <span class="project-name">${esc(p.name)}</span>
        <span class="project-type ${TIPOS[p.type]}">${TIPO_LBL[p.type]}</span>
        ${p.resp?`<span class="resp-tag">👤 ${esc(p.resp)}</span>`:''}
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <span class="project-pct">${pct}%</span>
        <span class="project-dates">📅 ${fmt(p.start)} → ${fmt(p.end)}</span>
        <button class="btn-x" onclick="event.stopPropagation();gDeleteProject(${p.id})" title="Eliminar tarea madre">✕</button>
      </div>
      <div id="gsubs-${p.id}" style="display:${p.open?'block':'none'}">
        <div class="subtasks">${subsHtml}</div>
        <div class="add-sub-row">
          <input type="text" placeholder="+ Nueva subtarea..." id="ginp-${p.id}" onkeydown="if(event.key==='Enter')gAddSub(${p.id})">
          <input type="text" placeholder="Responsable" id="gresp-${p.id}" style="width:90px">
          <input type="date" id="gdt-${p.id}">
          <select id="gst-${p.id}">${STATUSES.slice(0,3).map(s=>`<option value="${s}">${ST_LBL[s]}</option>`).join('')}</select>
          <button onclick="gAddSub(${p.id})">+ Agregar</button>
        </div>
      </div>`;
    el.appendChild(block);
  });
  document.getElementById('g-total').textContent=total;
  document.getElementById('g-pend').textContent=pend;
  document.getElementById('g-proc').textContent=proc;
  document.getElementById('g-done').textContent=done;
  if(typeof updateAdminUI==='function') updateAdminUI();
}

function gHeaderClick(e,id){if(e.target.closest('.btn-x')||e.target.closest('.drag-handle'))return;gToggleProject(id);}
function gToggleProject(id){const p=gprojects.find(x=>x.id===id);p.open=!p.open;gsave();renderGestor();}
function gToggleDone(pid,sid){const p=gprojects.find(x=>x.id===pid);const s=p.subs.find(x=>x.id===sid);s.done=!s.done;if(s.done)s.status='listo';gsave();renderGestor();}
function gChangeStatus(pid,sid,val){const p=gprojects.find(x=>x.id===pid);const s=p.subs.find(x=>x.id===sid);s.status=val;s.done=val==='listo';gsave();renderGestor();}
function gDeleteSub(pid,sid){if(!confirm('¿Eliminar esta subtarea?'))return;const p=gprojects.find(x=>x.id===pid);p.subs=p.subs.filter(s=>s.id!==sid);gsave();renderGestor();}
function gDeleteProject(id){if(!confirm('¿Eliminar esta tarea madre y todas sus subtareas?'))return;gprojects=gprojects.filter(p=>p.id!==id);gsave();renderGestor();}
function gSaveComment(pid,sid,v){const p=gprojects.find(x=>x.id===pid);const s=p.subs.find(x=>x.id===sid);s.comment=v;gsave();}
function gSaveResp(pid,sid,v){const p=gprojects.find(x=>x.id===pid);const s=p.subs.find(x=>x.id===sid);s.resp=v;gsave();}
function gSaveDate(pid,sid,v){const p=gprojects.find(x=>x.id===pid);const s=p.subs.find(x=>x.id===sid);s.date=v;gsave();renderGestor();}
function gToggleComment(sid){openComments[sid]=!openComments[sid];renderGestor();}
function gAddSub(pid){
  const inp=document.getElementById('ginp-'+pid);const txt=inp.value.trim();if(!txt)return;
  const p=gprojects.find(x=>x.id===pid);
  p.subs.push({id:gsid++,text:txt,status:document.getElementById('gst-'+pid).value,date:document.getElementById('gdt-'+pid).value||'',done:false,resp:document.getElementById('gresp-'+pid).value.trim(),comment:''});
  inp.value='';gsave();renderGestor();
}
function toggleAddForm(){document.getElementById('add-form').classList.toggle('visible');}
function addProject(){
  const name=document.getElementById('np-name').value.trim();if(!name)return;
  gprojects.push({id:gpid++,name,type:document.getElementById('np-type').value,resp:document.getElementById('np-resp').value.trim(),start:document.getElementById('np-start').value,end:document.getElementById('np-end').value,open:true,subs:[]});
  document.getElementById('np-name').value='';
  toggleAddForm();gsave();renderGestor();
}
function onSubDS(e,pid,sid){dragSrcPid=pid;dragSrcSid=sid;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('type','subtask');e.stopPropagation();setTimeout(()=>e.target.classList.add('sub-dragging'),0);}
function onSubDE(e){e.target.classList.remove('sub-dragging');document.querySelectorAll('.subtask-row').forEach(r=>r.classList.remove('sub-drag-over'));}
function onSubDO(e,pid,sid){if(dragSrcSid===null)return;e.preventDefault();e.stopPropagation();document.querySelectorAll('.subtask-row').forEach(r=>r.classList.remove('sub-drag-over'));if(sid!==dragSrcSid)e.currentTarget.classList.add('sub-drag-over');}
function onSubDL(e){e.currentTarget.classList.remove('sub-drag-over');}
function onSubDrop(e,toPid,toSid){e.preventDefault();e.stopPropagation();document.querySelectorAll('.subtask-row').forEach(r=>r.classList.remove('sub-drag-over'));if(dragSrcSid===null||dragSrcSid===toSid)return;const srcP=gprojects.find(x=>x.id===dragSrcPid);const tgtP=gprojects.find(x=>x.id===toPid);const si=srcP.subs.findIndex(s=>s.id===dragSrcSid);const ti=tgtP.subs.findIndex(s=>s.id===toSid);const[m]=srcP.subs.splice(si,1);tgtP.subs.splice(ti,0,m);dragSrcPid=null;dragSrcSid=null;gsave();renderGestor();}

function setGestorView(v,btn){
  document.querySelectorAll('.view-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.getElementById('g-lista').style.display=v==='lista'?'':'none';
  document.getElementById('g-semana').style.display=v==='semana'?'':'none';
  if(v==='semana')renderWeek();
}
function getWeekDates(offset){const d=new Date(now);const day=d.getDay()||7;d.setDate(d.getDate()-day+1+offset*7);return Array.from({length:5},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x});}
function renderWeek(){
  const dates=getWeekDates(weekOffset);const todayISO=isoToday();
  document.getElementById('week-label').textContent=`${dates[0].getDate()} ${MONTHS_S[dates[0].getMonth()]} — ${dates[4].getDate()} ${MONTHS_S[dates[4].getMonth()]} ${dates[4].getFullYear()}`;
  document.getElementById('week-header').innerHTML=dates.map((d,i)=>`<div class="week-day-hdr${toISO(d)===todayISO?' today':''}">${DAYS[i]} ${d.getDate()}</div>`).join('');
  const grid=document.getElementById('week-grid');grid.innerHTML='';
  dates.forEach(d=>{
    const iso=toISO(d);const col=document.createElement('div');
    col.className='week-col'+(iso===todayISO?' today-col':'');
    const chips=[];
    gprojects.forEach(p=>{p.subs.forEach(s=>{if(s.date===iso){chips.push(`<div class="week-chip" style="border-left-color:${TYPE_COLOR[p.type]}"><div class="chip-parent">${esc(p.name)}</div><div>${esc(s.text)}</div>${s.resp?`<div style="font-size:10px;color:var(--text3);margin-top:3px">👤 ${esc(s.resp)}</div>`:''}</div>`);}});});
    col.innerHTML=chips.length?chips.join(''):`<div style="font-size:11px;color:var(--text3);text-align:center;padding-top:12px">Sin tareas</div>`;
    grid.appendChild(col);
  });
}
function shiftWeek(n){weekOffset+=n;renderWeek();}
function goToday(){weekOffset=0;renderWeek();}

/* ════════ INIT ════════ */
async function initApp(){
  showLoadingOverlay(true);
  await cloudLoadAll();
  gload();
  renderObjetivos();
  renderGestor();
  updateAdminUI();
  showLoadingOverlay(false);
}

function showLoadingOverlay(show){
  let ov=document.getElementById('cloud-loading-overlay');
  if(show){
    if(!ov){
      ov=document.createElement('div');
      ov.id='cloud-loading-overlay';
      ov.style.cssText='position:fixed;inset:0;background:rgba(255,255,255,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
      ov.innerHTML='<div style="width:28px;height:28px;border:3px solid #e0dfd8;border-top-color:#534AB7;border-radius:50%;animation:spin 0.8s linear infinite"></div><div style="font-size:13px;color:#555">Cargando datos desde la nube...</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
      document.body.appendChild(ov);
    }
    ov.style.display='flex';
  } else if(ov){
    ov.style.display='none';
  }
}

initApp();
</script>
